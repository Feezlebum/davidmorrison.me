<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background -->
  <rect width="32" height="32" fill="#0B0906"/>
  <!-- outer circle -->
  <circle cx="16" cy="16" r="11.5" fill="none" stroke="#39FF14" stroke-width="1.4"/>
  <!-- inner tick circle -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="#39FF14" stroke-width="0.6" opacity="0.4"/>
  <!-- horizontal crosshair (gap in center) -->
  <line x1="2"  y1="16" x2="11" y2="16" stroke="#39FF14" stroke-width="1.4"/>
  <line x1="21" y1="16" x2="30" y2="16" stroke="#39FF14" stroke-width="1.4"/>
  <!-- vertical crosshair (gap in center) -->
  <line x1="16" y1="2"  x2="16" y2="11" stroke="#39FF14" stroke-width="1.4"/>
  <line x1="16" y1="21" x2="16" y2="30" stroke="#39FF14" stroke-width="1.4"/>
  <!-- center dot -->
  <circle cx="16" cy="16" r="1.6" fill="#39FF14"/>
  <!-- corner tick marks -->
  <line x1="4"  y1="4"  x2="7"  y2="4"  stroke="#39FF14" stroke-width="0.8" opacity="0.5"/>
  <line x1="4"  y1="4"  x2="4"  y2="7"  stroke="#39FF14" stroke-width="0.8" opacity="0.5"/>
  <line x1="28" y1="4"  x2="25" y2="4"  stroke="#39FF14" stroke-width="0.8" opacity="0.5"/>
  <line x1="28" y1="4"  x2="28" y2="7"  stroke="#39FF14" stroke-width="0.8" opacity="0.5"/>
  <line x1="4"  y1="28" x2="7"  y2="28" stroke="#39FF14" stroke-width="0.8" opacity="0.5"/>
  <line x1="4"  y1="28" x2="4"  y2="25" stroke="#39FF14" stroke-width="0.8" opacity="0.5"/>
  <line x1="28" y1="28" x2="25" y2="28" stroke="#39FF14" stroke-width="0.8" opacity="0.5"/>
  <line x1="28" y1="28" x2="28" y2="25" stroke="#39FF14" stroke-width="0.8" opacity="0.5"/>
</svg>
